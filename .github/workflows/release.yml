name: release

# Build the standalone VAbkStudio.exe and attach it to a GitHub Release when a
# version tag (e.g. v0.1.0) is pushed:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-exe:
    name: Build VAbkStudio.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv (build.ps1 uses it to create the venv)
        run: python -m pip install uv

      - name: Build the exe
        run: .\build.ps1

      - name: Publish to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VAbkStudio.exe
          name: VAbk Studio ${{ github.ref_name }}
          body: |
            Standalone Windows build of VAbk Studio ${{ github.ref_name }}.

            Download **VAbkStudio.exe** below, drop it in its own folder, and run it.
            On first launch it sets up its workspace and downloads what it needs
            (ffmpeg, and — for the Full Pipeline — Abogen) into a `data/` folder
            next to the exe. No Python install required.
